<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Sprite</title>
    <style>
        canvas {
            border: 2px solid #000;
            display: block;
            margin: 20px auto;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>🎮 Meu Primeiro Sprite em Movimento!</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <script>
        // Pega o elemento canvas da página
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Variáveis para controlar o movimento
        let spriteX = 50;  // Posição horizontal do sprite
        let spriteY = 150; // Posição vertical do sprite
        let velocidade = 2; // Velocidade do movimento
        
        // Cria uma imagem do sprite (você pode usar qualquer imagem)
        const sprite = new Image();
        sprite.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIHZpZXdCb3g9IjAgMCA2NCA2NCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiBmaWxsPSIjNEY4MUJEIiByeD0iOCIvPgo8Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSI0IiBmaWxsPSJ3aGl0ZSIvPgo8Y2lyY2xlIGN4PSI0NCIgY3k9IjIwIiByPSI0IiBmaWxsPSJ3aGl0ZSIvPgo8cGF0aCBkPSJNMTYgNDBINDhDNDggNDQgNDQgNDggNDAgNDhIMjRDMjAgNDggMTYgNDQgMTYgNDBaIiBmaWxsPSJ3aGl0ZSIvPgo8L3N2Zz4K';
        
        // Função que desenha o sprite na tela
        function desenharSprite() {
            // Limpa a tela inteira (como apagar um quadro)
            ctx.fillStyle = '#87CEEB'; // Cor de fundo azul claro
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Desenha o sprite na posição atual
            ctx.drawImage(sprite, spriteX, spriteY, 64, 64);
        }
        
        // Função que atualiza a posição do sprite
        function moverSprite() {
            // Move o sprite para a direita
            spriteX += velocidade;
            
            // Se o sprite saiu da tela pela direita, volta para a esquerda
            if (spriteX > canvas.width) {
                spriteX = -64; // Começa um pouco fora da tela
            }
        }
        
        // Função principal que roda o jogo
        function loop() {
            moverSprite();    // Atualiza a posição
            desenharSprite(); // Desenha na nova posição
            
            // Chama esta função novamente no próximo frame
            requestAnimationFrame(loop);
        }
        
        // Quando a imagem carregar, inicia o loop do jogo
        sprite.onload = function() {
            loop();
        };
    </script>
    
    <p>👆 Veja seu sprite se movendo! Este é um exemplo básico de como sprites funcionam em jogos.</p>
</body>
</html>
